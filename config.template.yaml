# ============================================================================
# Job Finder — Configuración (Template)
# ============================================================================
# Copia este archivo como "config.yaml" y completa con tus tokens reales.
# config.yaml está en .gitignore para evitar commits accidentales.
# ============================================================================

# --- Telegram ---
telegram:
  bot_token: "123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11"
  chat_id: "123456789"                 # tu chat ID personal
  # Cómo obtenerlos:
  # 1. Crear bot con @BotFather en Telegram
  # 2. Obtener CHAT_ID: enviar mensaje al bot, luego visitar
  #    https://api.telegram.org/bot<TOKEN>/getUpdates

# --- WeWorkRemotely ---
weworkremotely:
  enabled: true
  # Nota: los feeds se auto-configuran en el scraper con las URLs válidas actuales:
  #   - remote-jobs.rss (general)
  #   - categories/remote-programming-jobs.rss (programación)

# --- LinkedIn ---
# LinkedIn usa la Guest Jobs API (no requiere autenticación).
# Opcionalmente podés configurar tu cookie li_at para resultados personalizados.
linkedin:
  enabled: true
  # search_keywords: [".NET", "Angular", "Senior", "Remote"]  # override del perfil
  # li_at_cookie: ""  # opcional: tu cookie li_at para resultados autenticados

# --- Ranking Thresholds ---
ranking:
  min_score_to_notify: 60              # mínimo score (0-100) para incluir en notificación
  show_top: 10                         # cuántos mostrar en Telegram

# --- General ---
general:
  lookback_days: 30                    # días hacia atrás para buscar
  output_dir: "output"                 # directorio de resultados
